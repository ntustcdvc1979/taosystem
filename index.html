<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>成全名單管理</title>
  </head>
  <body>
    <div id="app">
      <!-- 登入畫面 -->
      <section id="login-view" class="view">
        <div class="login-box">
          <h1>成全名單管理</h1>
          <p class="subtitle">請使用授權的 Google 帳號登入</p>
          <button id="google-login-btn" class="btn-google" type="button">
            <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            使用 Google 帳號登入
          </button>
          <p id="login-error" class="error-text"></p>
        </div>
      </section>

      <!-- 主畫面 -->
      <section id="app-view" class="view hidden">
        <header class="topbar">
          <h1>成全名單管理</h1>
          <div class="topbar-right">
            <span id="current-user"></span>
            <button id="logout-btn" class="btn-secondary">登出</button>
          </div>
        </header>

        <div class="toolbar">
          <input type="search" id="search-input" placeholder="搜尋姓名 / 系級 / 背景 / 聯絡人..." />
          <select id="filter-status">
            <option value="">所有成全狀況</option>
            <option value="未求道">未求道</option>
            <option value="已求道">已求道</option>
            <option value="法會畢">法會畢</option>
            <option value="新民班畢">新民班畢</option>
            <option value="至善班畢">至善班畢</option>
            <option value="行德班畢">行德班畢</option>
            <option value="崇德班畢">崇德班畢</option>
            <option value="人才培訓班畢">人才培訓班畢</option>
            <option value="講培班畢">講培班畢</option>
            <option value="講師">講師</option>
            <option value="未確定">未確定</option>
          </select>
          <button id="add-entry-btn" class="btn-primary">＋ 新增名單</button>
        </div>

        <div class="table-wrapper">
          <table id="entries-table">
            <thead>
              <tr>
                <th>姓名</th>
                <th>系級</th>
                <th>背景</th>
                <th>備註</th>
                <th>聯絡人</th>
                <th>成全狀況</th>
                <th>策略</th>
                <th>做法</th>
                <th>活動紀錄</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="entries-tbody">
              <tr id="empty-row"><td colspan="10" class="empty-text">尚無資料</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- 新增/編輯 對話框 -->
      <div id="entry-modal" class="modal hidden">
        <div class="modal-content">
          <h2 id="modal-title">新增名單</h2>
          <form id="entry-form">
            <input type="hidden" id="entry-id" />
            <label>
              姓名 <span class="required">*</span>
              <input type="text" id="field-name" required />
              <span class="hint-text">系統內照常顯示完整姓名；只有送給 AI 分析時才會自動遮罩（例：王小明 → 王○明）。</span>
            </label>
            <label>
              系級
              <input type="text" id="field-department" placeholder="例：資工三" />
            </label>
            <label>
              背景
              <textarea id="field-background" rows="2" placeholder="用文字描述背景，例如：熱音社社員、大四資工系家教、系排球隊、超商打工"></textarea>
            </label>
            <label>
              備註
              <textarea id="field-notes" rows="2"></textarea>
            </label>
            <label>
              聯絡人
              <input type="text" id="field-contact" placeholder="負責這位的人" />
            </label>
            <label>
              成全狀況
              <select id="field-status">
                <option value="">請選擇</option>
                <option value="未求道">未求道</option>
                <option value="已求道">已求道</option>
                <option value="法會畢">法會畢</option>
                <option value="新民班畢">新民班畢</option>
                <option value="至善班畢">至善班畢</option>
                <option value="行德班畢">行德班畢</option>
                <option value="崇德班畢">崇德班畢</option>
                <option value="人才培訓班畢">人才培訓班畢</option>
                <option value="講培班畢">講培班畢</option>
                <option value="講師">講師</option>
                <option value="未確定">未確定</option>
              </select>
            </label>
            <label>
              策略
              <textarea id="field-strategy" rows="2"></textarea>
            </label>
            <label>
              做法
              <textarea id="field-method" rows="2"></textarea>
            </label>

            <div class="modal-actions">
              <button type="button" id="cancel-btn" class="btn-secondary">取消</button>
              <button type="submit" class="btn-primary">儲存</button>
            </div>
          </form>
        </div>
      </div>

      <!-- 活動紀錄 對話框（每個人獨立管理，不依附在新增名單表單裡） -->
      <div id="activity-modal" class="modal hidden">
        <div class="modal-content">
          <h2>活動紀錄 - <span id="activity-modal-name"></span></h2>

          <div id="activities-list"></div>
          <p id="activities-empty-hint" class="hint-text">尚無活動紀錄。</p>

          <div class="activity-add-row">
            <input type="text" id="new-act-name" placeholder="活動名稱" />
            <input type="text" id="new-act-date" placeholder="日期(選填)" />
            <input type="text" id="new-act-reaction" placeholder="反應 / 回饋" />
            <button type="button" id="add-activity-btn" class="btn-primary btn-small">新增</button>
          </div>

          <div class="modal-actions">
            <button type="button" id="activity-close-btn" class="btn-secondary">關閉</button>
          </div>
        </div>
      </div>

      <!-- AI 成全建議 對話框 -->
      <div id="ai-modal" class="modal hidden">
        <div class="modal-content">
          <h2>AI 成全建議 - <span id="ai-modal-name"></span></h2>

          <div id="ai-ready-section">
            <p class="hint-text">
              會將此對象「去識別化後」（姓名、聯絡人遮罩）的背景、成全狀況與活動紀錄送給 Claude 分析，產生建議的策略與具體做法。
            </p>
            <button type="button" id="ai-generate-btn" class="btn-primary">產生建議</button>
            <p id="ai-loading" class="hint-text hidden">分析中，請稍候（約需 10～60 秒）...</p>
            <p id="ai-error" class="error-text"></p>

            <div id="ai-result" class="ai-result hidden">
              <h3>策略</h3>
              <p id="ai-result-strategy"></p>
              <h3>具體做法</h3>
              <p id="ai-result-method"></p>
              <button type="button" id="ai-apply-btn" class="btn-primary">套用到「策略 / 做法」欄位</button>
            </div>
          </div>

          <div class="modal-actions">
            <button type="button" id="ai-close-btn" class="btn-secondary">關閉</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
